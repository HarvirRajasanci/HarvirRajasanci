<svg width="100%" viewBox="0 0 680 510" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Harvir Rajasanci — GitHub Profile</title>
  <desc>Terminal-style GitHub profile README for Harvir Rajasanci</desc>

  <defs>
    <style>
      @media (prefers-color-scheme: dark) {
        .bg       { fill: #1e1e1e; }
        .titlebar { fill: #2d2d2d; }
        .border   { stroke: #444; }
        .txt      { fill: #d4d4d4; }
        .dim      { fill: #888; }
        .prompt   { fill: #58a6ff; }
        .key      { fill: #c792ea; }
        .str      { fill: #c3e88d; }
        .bracket  { fill: #89ddff; }
        .divider  { stroke: #444; }
      }
      @media (prefers-color-scheme: light) {
        .bg       { fill: #f6f8fa; }
        .titlebar { fill: #e8eaed; }
        .border   { stroke: #d0d7de; }
        .txt      { fill: #24292f; }
        .dim      { fill: #57606a; }
        .prompt   { fill: #0969da; }
        .key      { fill: #8250df; }
        .str      { fill: #116329; }
        .bracket  { fill: #0550ae; }
        .divider  { stroke: #d0d7de; }
      }
      text { font-family: 'Fira Code', 'Courier New', monospace; }
    </style>
  </defs>

  <!-- Window -->
  <rect class="bg border" x="0" y="0" width="680" height="510" rx="10" stroke-width="1"/>

  <!-- Title bar -->
  <rect class="titlebar" x="0" y="0" width="680" height="36" rx="10"/>
  <rect class="titlebar" x="0" y="18" width="680" height="18"/>

  <!-- Traffic lights -->
  <circle cx="20" cy="18" r="6" fill="#ff5f56"/>
  <circle cx="40" cy="18" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="18" r="6" fill="#27c93f"/>

  <!-- Title -->
  <text class="dim" x="340" y="23" font-size="12" text-anchor="middle" dominant-baseline="central">harvir@github: ~</text>

  <!-- Divider -->
  <line class="divider" x1="0" y1="36" x2="680" y2="36" stroke-width="0.5"/>

  <!-- whoami command -->
  <text x="24" y="62" font-size="11"><tspan class="prompt">harvir@github</tspan><tspan class="dim">:~$ </tspan><tspan class="txt">whoami</tspan></text>
  <text class="dim" x="24" y="78" font-size="11">  &gt; software engineer</text>
  <text class="dim" x="24" y="93" font-size="11">  &gt; based in vancouver, canada</text>

  <!-- status.json command -->
  <text x="24" y="116" font-size="11"><tspan class="prompt">harvir@github</tspan><tspan class="dim">:~$ </tspan><tspan class="txt">cat status.json</tspan></text>
  <text class="bracket" x="24" y="132" font-size="11">{</text>
  <text x="36" y="147" font-size="11"><tspan class="key">"os"</tspan><tspan class="dim">       : </tspan><tspan class="str">"macOS"</tspan><tspan class="dim">,</tspan></text>
  <text x="36" y="162" font-size="11"><tspan class="key">"learning"</tspan><tspan class="dim"> : </tspan><tspan class="str">"go"</tspan><tspan class="dim">,</tspan></text>
  <text x="36" y="177" font-size="11"><tspan class="key">"focus"</tspan><tspan class="dim">    : </tspan><tspan class="str">"exploring"</tspan><tspan class="dim">,</tspan></text>
  <text x="36" y="192" font-size="11"><tspan class="key">"currently"</tspan><tspan class="dim">: [</tspan></text>
  <text class="str" x="48" y="207" font-size="11">"interning @ shopify",</text>
  <text class="str" x="48" y="222" font-size="11">"studying computer science @ bcit",</text>
  <text class="str" x="48" y="237" font-size="11">"building side projects"</text>
  <text class="dim" x="36" y="252" font-size="11">]</text>
  <text class="bracket" x="24" y="267" font-size="11">}</text>

  <!-- stack.txt command -->
  <text x="24" y="290" font-size="11"><tspan class="prompt">harvir@github</tspan><tspan class="dim">:~$ </tspan><tspan class="txt">cat stack.txt</tspan></text>

  <!-- languages -->
  <text class="dim" x="24" y="306" font-size="11">  [ python ]  [ typescript ]  [ javascript ]  [ go ]</text>
  <text class="dim" x="24" y="321" font-size="11">  [ java   ]  [ c++        ]  [ ruby        ]  [ sql ]</text>

  <!-- frameworks -->
  <text class="dim" x="24" y="343" font-size="11">  [ react  ]  [ next.js   ]  [ node.js  ]  [ express ]</text>
  <text class="dim" x="24" y="358" font-size="11">  [ graphql ]  [ grpc     ]  [ protobuf ]</text>

  <!-- tools -->
  <text class="dim" x="24" y="380" font-size="11">  [ docker ]  [ kubernetes ]  [ redis   ]  [ postgres ]</text>
  <text class="dim" x="24" y="395" font-size="11">  [ aws    ]  [ linux      ]  [ git     ]</text>

  <!-- links.txt command -->
  <text x="24" y="418" font-size="11"><tspan class="prompt">harvir@github</tspan><tspan class="dim">:~$ </tspan><tspan class="txt">cat links.txt</tspan></text>
  <text class="dim" x="24" y="434" font-size="11">  [linkedin] → linkedin.com/in/HarvirRajasanci</text>
  <text class="dim" x="24" y="449" font-size="11">  [github]   → github.com/HarvirRajasanci</text>

  <!-- exit -->
  <text x="24" y="472" font-size="11"><tspan class="prompt">harvir@github</tspan><tspan class="dim">:~$ </tspan><tspan class="txt">exit</tspan></text>
  <text class="dim" x="24" y="487" font-size="11">  [process exited with code 0]</text>
</svg>
